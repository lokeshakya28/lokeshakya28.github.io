<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #4ade80;
    --accent-dim: #22c55e;
    --accent-glow: rgba(74, 222, 128, 0.15);
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: rgba(255, 255, 255, 0.03);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --text-primary: #f0f0f5;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--accent-dim) var(--bg-primary); }
  html::-webkit-scrollbar { width: 6px; }
  html::-webkit-scrollbar-track { background: var(--bg-primary); }
  html::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow-x: hidden;
    cursor: none;
    line-height: 1.6;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor-dot {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transition: transform 0.15s ease, opacity 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1.5px solid rgba(74, 222, 128, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
  }
  .cursor-ring.hovering {
    width: 60px; height: 60px;
    border-color: var(--accent);
    background: rgba(74, 222, 128, 0.05);
  }

  /* ── CURSOR TRAIL ── */
  .trail-dot {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  /* ── BACKGROUND PARTICLES ── */
  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── NOISE GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 48px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    transition: transform 0.35s ease, background 0.35s ease;
  }
  nav.hidden { transform: translateY(-100%); }
  nav.scrolled { background: rgba(10, 10, 15, 0.85); }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: logoPulse 2.5s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .nav-links {
    display: flex;
    gap: 8px;
    list-style: none;
  }
  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    position: relative;
    transition: color 0.25s ease, background 0.25s ease;
  }
  .nav-links a:hover, .nav-links a.active {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.04);
  }
  .nav-links a.active::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 2px;
    background: var(--accent);
    border-radius: 1px;
  }

  /* ── HAMBURGER ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    z-index: 1001;
  }
  .hamburger span {
    width: 24px; height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* ── MOBILE NAV OVERLAY ── */
  .mobile-nav {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100vh;
    background: rgba(10, 10, 15, 0.95);
    backdrop-filter: blur(30px);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .mobile-nav.active { opacity: 1; pointer-events: all; }
  .mobile-nav a {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s ease, transform 0.2s ease;
    transform: translateY(20px);
    opacity: 0;
  }
  .mobile-nav.active a {
    transform: translateY(0);
    opacity: 1;
  }
  .mobile-nav a:nth-child(1) { transition-delay: 0.1s; }
  .mobile-nav a:nth-child(2) { transition-delay: 0.15s; }
  .mobile-nav a:nth-child(3) { transition-delay: 0.2s; }
  .mobile-nav a:nth-child(4) { transition-delay: 0.25s; }
  .mobile-nav a:hover { color: var(--accent); }

  /* ── SECTIONS ── */
  section {
    position: relative;
    z-index: 2;
    padding: 120px 48px 80px;
  }

  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .section-subtitle {
    font-size: 1.05rem;
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 56px;
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 72px;
    position: relative;
  }

  .hero-content { max-width: 800px; }

  .hero-greeting {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .hero-greeting span { color: var(--accent); }

  .hero-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 0.95;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-tagline {
    font-size: clamp(1.1rem, 2vw, 1.35rem);
    color: var(--text-secondary);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .hero-tagline .highlight {
    color: var(--accent);
    font-weight: 600;
  }

  .hero-cta-group {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: var(--accent);
    color: var(--bg-primary);
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(74, 222, 128, 0.3);
    background: #5eead4;
  }
  .btn-primary svg { width: 16px; height: 16px; }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: transparent;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.9rem;
    text-decoration: none;
    border: 1px solid var(--border-subtle);
    border-radius: 100px;
    cursor: pointer;
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .btn-ghost:hover {
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.03);
  }

  .hero-scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: scrollBounce 2s ease-in-out infinite;
  }
  .scroll-line {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, var(--accent), transparent);
  }
  @keyframes scrollBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  /* ── WORK GRID ── */
  .work-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 24px;
  }

  .work-card {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-color 0.3s ease, box-shadow 0.4s ease;
    cursor: pointer;
    group: true;
  }
  .work-card:hover {
    transform: translateY(-6px);
    border-color: rgba(74, 222, 128, 0.2);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(74, 222, 128, 0.05);
  }

  .work-card-image {
    width: 100%;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    position: relative;
    background: var(--bg-secondary);
  }
  .work-card-image img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), filter 0.4s ease;
    filter: saturate(0.8) brightness(0.9);
  }
  .work-card:hover .work-card-image img {
    transform: scale(1.06);
    filter: saturate(1) brightness(1);
  }

  .work-card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10, 10, 15, 0.8) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: flex-end;
    padding: 24px;
  }
  .work-card:hover .work-card-overlay { opacity: 1; }
  .work-card-overlay span {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .work-card-info { padding: 24px; }
  .work-card-info h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .work-card-info p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .work-card-tags {
    display: flex;
    gap: 8px;
    padding: 0 24px 24px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(74, 222, 128, 0.08);
    color: var(--accent);
    border: 1px solid rgba(74, 222, 128, 0.12);
  }

  /* ── VIDEO SECTION ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 24px;
  }

  .video-card {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), border-color 0.3s ease;
  }
  .video-card:hover {
    transform: translateY(-4px);
    border-color: rgba(74, 222, 128, 0.15);
  }

  .video-card-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    position: relative;
    background: var(--bg-secondary);
  }
  .video-card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
    filter: brightness(0.85);
  }
  .video-card:hover .video-card-thumb img { transform: scale(1.04); }

  .play-button {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: background 0.3s ease, transform 0.3s ease;
    cursor: pointer;
  }
  .play-button:hover {
    background: var(--accent);
    transform: translate(-50%, -50%) scale(1.1);
  }
  .play-button svg {
    width: 20px; height: 20px;
    fill: var(--text-primary);
    margin-left: 3px;
  }
  .play-button:hover svg { fill: var(--bg-primary); }

  .video-card-info { padding: 24px; }
  .video-card-info h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .video-card-info p {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  /* ── ABOUT ── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }

  .about-text p {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 20px;
  }
  .about-text .highlight-text { color: var(--accent); font-weight: 500; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 40px;
  }
  .stat-card {
    padding: 28px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    transition: border-color 0.3s ease;
  }
  .stat-card:hover { border-color: rgba(74, 222, 128, 0.2); }
  .stat-number {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .about-image-wrapper {
    position: relative;
    border-radius: var(--radius-xl);
    overflow: hidden;
    aspect-ratio: 3/4;
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
  }
  .about-image-wrapper img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.85);
    transition: filter 0.4s ease;
  }
  .about-image-wrapper:hover img { filter: saturate(1); }
  .about-image-badge {
    position: absolute;
    bottom: 24px; left: 24px;
    padding: 12px 20px;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(16px);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.8rem;
    color: var(--text-primary);
    font-weight: 500;
  }
  .about-image-badge span { color: var(--accent); }

  /* ── CONTACT ── */
  .contact-wrapper {
    max-width: 640px;
  }

  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .form-group input,
  .form-group textarea {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--text-muted); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .contact-links {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }
  .contact-links a {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    text-decoration: none;
  }
  .contact-links a:hover {
    color: var(--accent);
    border-color: rgba(74, 222, 128, 0.3);
    background: rgba(74, 222, 128, 0.05);
  }
  .contact-links a svg { width: 18px; height: 18px; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 2;
    padding: 40px 48px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between
